  <circle cx="160" cy="160" r="118" fill="none" stroke="#E8A33D" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="11 9"/>
  <circle cx="160" cy="160" r="94" fill="none" stroke="#8B3A2B" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="9 8"/>
  <circle cx="160" cy="160" r="70" fill="none" stroke="#E8A33D" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="7 7"/>

  <g fill="#E8A33D">
    <polygon points="160,102 134,150 186,150"/>
